<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Chakye 翻訳チャットAI + 読み上げ</title>
<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
textarea{
  width:80%;
  height:80px;
  padding:10px;
  border-radius:10px;
  border:none;
}
select,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}
#chat{
  margin-top:20px;
  width:80%;
  max-width:800px;
  margin-left:auto;
  margin-right:auto;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:left;
  min-height:200px;
  overflow-y:auto;
}
.message{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}
.user{
  background:#2563eb;
  color:white;
  text-align:right;
}
.bot{
  background:#16a34a;
  color:white;
  text-align:left;
}
</style>
</head>

<body>
<h1>🌍 Chakye 翻訳チャットAI + 読み上げ</h1>

<textarea id="input" placeholder="翻訳したい文章を入力"></textarea><br>

<label>翻訳元：</label>
<select id="source">
  <option value="auto">自動判定</option>
  <option value="ja">日本語</option>
  <option value="en">英語</option>
  <option value="zh-CN">中国語</option>
  <option value="ko">韓国語</option>
</select>

<label>翻訳先：</label>
<select id="target">
  <option value="en">英語</option>
  <option value="ja">日本語</option>
  <option value="zh-CN">中国語</option>
  <option value="ko">韓国語</option>
  <option value="fr">フランス語</option>
</select>

<br>
<button onclick="sendMessage()">送信</button>

<div id="chat"></div>

<script>
async function sendMessage(){
  const text = document.getElementById("input").value;
  const source = document.getElementById("source").value;
  const target = document.getElementById("target").value;
  if(!text) return;

  const chat = document.getElementById("chat");

  // ユーザメッセージ表示
  const userDiv = document.createElement("div");
  userDiv.className="message user";
  userDiv.innerText=text;
  chat.appendChild(userDiv);
  chat.scrollTop = chat.scrollHeight;

  // 翻訳中メッセージ
  const botDiv = document.createElement("div");
  botDiv.className="message bot";
  botDiv.innerText="翻訳中...";
  chat.appendChild(botDiv);
  chat.scrollTop = chat.scrollHeight;

  try{
    const url = "https://translate.googleapis.com/translate_a/single?client=gtx"
      + "&sl=" + source
      + "&tl=" + target
      + "&dt=t&q=" + encodeURIComponent(text);

    const res = await fetch(url);
    if(!res.ok) throw new Error("通信エラー");

    const data = await res.json();
    let result = "";
    data[0].forEach(item => { if(item[0]) result += item[0]; });

    botDiv.innerText = result;
    chat.scrollTop = chat.scrollHeight;

    // 🔊 翻訳結果を読み上げ
    const utter = new SpeechSynthesisUtterance(result);
    // 翻訳先言語に合わせて音声設定
    utter.lang = target; 
    speechSynthesis.speak(utter);

  }catch(e){
    botDiv.innerText = "⚠️ 翻訳できません";
  }

  document.getElementById("input").value="";
}
</script>

</body></html>
